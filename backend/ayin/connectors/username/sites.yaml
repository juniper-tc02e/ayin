  url_main: "https://pastebin.com/"
  detection: { method: status_code, found_codes: [200] }
  sensitivity: medium  # public pastes under a handle can leak a lot
  removable: true
  opt_out: { url: "https://pastebin.com/settings", instructions: "Delete pastes / the account from settings." }
  governance: { access_method: public_page, tos_status: ok }
  fixtures: { claimed: "ayindemo", unclaimed: "ayinabsentzzq000" }

# ── NON-`ok` rows: parsed + validated, but NEVER probed (gate demo) ───
- id: reddit
  name: Reddit
  category: social
  url_template: "https://www.reddit.com/user/{username}"
  url_main: "https://www.reddit.com/"
  detection: { method: status_code, found_codes: [200] }
  sensitivity: medium
  removable: true
  # Reddit's automated-access stance + aggressive anti-bot needs counsel review
  # before we probe it. Parsed, but enabled_sites() withholds it.
  governance: { access_method: public_page, tos_status: unvetted }
  fixtures: { claimed: "ayindemo", unclaimed: "ayinabsentzzq000" }

- id: instagram
  name: Instagram
  category: social
  url_template: "https://www.instagram.com/{username}/"
  url_main: "https://www.instagram.com/"
  # response_url detection: anonymous hits to a missing profile redirect to login.
  detection: { method: response_url, notfound_url_contains: "/accounts/login" }
  sensitivity: high
  removable: true
  # IG ToS forbids automated access without the Graph API → blocked, never probed.
  governance: { access_method: public_page, tos_status: blocked }
  fixtures: { claimed: "instagram", unclaimed: "ayinabsentzzq000" }

- id: example_dating
  name: "Example dating site"
  category: dating
  url_template: "https://example.com/u/{username}"
  url_main: "https://example.com/"
  detection: { method: status_code, found_codes: [200] }
  sensitivity: critical
  nsfw: true
  # Sensitive + behind a login → auth_required; would only ever run for a Tier-1
  # VERIFIED owner who explicitly opted in (UF5). Never probed by default.
  governance: { access_method: public_page, tos_status: auth_required }
  fixtures: { claimed: "ayindemo", unclaimed: "ayinabsentzzq000" }
