# Username Footprint — vetted site manifest (UF1)
#
# Ayin-owned, ToS-REVIEWED derivative of the Sherlock project's detection manifest
# (https://github.com/sherlock-project/sherlock, MIT License). Detection mechanics
# (the three errorType strategies, regexCheck, request shaping) are derived from
# Sherlock's `data.json`; the site selection here is a deliberately SMALL, reviewed
# allowlist — not a wholesale import. Each row carries an Ayin governance block.
#
# tos_status is the gate: ONLY `ok` rows are probed in production (sites_loader.
# enabled_sites). `unvetted`/`blocked`/`auth_required` rows are parsed + validated
# but never hit the network — they document the review backlog and exercise the gate.
#
# fixtures.claimed/unclaimed are synthetic handles for contract tests (mock
# transports), never real PII. Where a row has regex_check, the fixtures match it.

# ── code / dev ───────────────────────────────────────────────────────
- id: github
  name: GitHub
  category: code
  url_template: "https://github.com/{username}"
  url_main: "https://github.com/"
  detection: { method: status_code, found_codes: [200] }
  regex_check: "^[A-Za-z0-9-]{1,39}$"
  sensitivity: low
  removable: true
  opt_out:
    url: "https://github.com/settings/admin"
    instructions: "Settings → Account → Delete account; or make the profile sparse / private."
    expected_processing: "immediate"
  governance: { access_method: public_page, tos_status: ok, robots_required: true, rate_limit_per_minute: 30 }
  fixtures: { claimed: "octocat", unclaimed: "ayin-absent-zzq000" }

