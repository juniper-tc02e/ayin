# ── message-based detection (site returns 200, body says "not found") ─
- id: hackernews
  name: "Hacker News"
  category: forum
  url_template: "https://news.ycombinator.com/user?id={username}"
  url_main: "https://news.ycombinator.com/"
  detection: { method: message, notfound_markers: ["No such user."] }
  regex_check: "^[A-Za-z0-9_-]{2,15}$"
  sensitivity: low
  removable: false
  governance: { access_method: public_page, tos_status: ok, rate_limit_per_minute: 20 }
  fixtures: { claimed: "ayindemo", unclaimed: "ayinabsentz" }

- id: steam
  name: "Steam Community"
  category: gaming
  url_template: "https://steamcommunity.com/id/{username}"
  url_main: "https://steamcommunity.com/"
  detection: { method: message, notfound_markers: ["The specified profile could not be found."] }
  sensitivity: low
  removable: true
  opt_out: { url: "https://store.steampowered.com/account/", instructions: "Set the profile to Private (Profile → Edit → Privacy)." }
  governance: { access_method: public_page, tos_status: ok }
  fixtures: { claimed: "ayindemo", unclaimed: "ayinabsentzzq000" }

- id: pastebin
