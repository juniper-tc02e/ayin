# Ayin data-broker registry (M1-4, PRD §13.6) — hand-curated, high-impact US
# people-search/broker sites. This file is an operational dataset: it drives
# DETECTION ONLY in the MVP (removal automation is Phase 2 — FR-REM-1).
#
# Governance notes:
# - Every entry MUST carry opt_out.url + opt_out.instructions (manual opt-out
#   guidance ships with each detection — BUILD-PLAN M1-4 acceptance).
# - probe.enabled stays false until (a) the URL template + markers are
#   verified against the live site and (b) counsel reviews the source row
#   (PRD §11.4). Detection logic is fully tested against fixtures meanwhile.
# - Opt-out URLs drift. verify_before_enable means exactly that.
#
# expected_processing values reflect the brokers' own stated/observed cycles;
# the CCPA/DROP cycle is ~45 days (PRD FR-REM-2).

version: "2026-06-10"
brokers:
  - id: whitepages
    name: Whitepages
    base_url: https://www.whitepages.com
    family: whitepages
    exposed_fields: [name, age, address, phone, relatives]
    opt_out:
      url: https://www.whitepages.com/suggest/optout
      instructions: >
        Search for your listing on whitepages.com, copy the listing URL, then
        submit it at the opt-out page. Requires confirming via an automated
        phone call to a number you control.
      expected_processing: ~24-72 hours
    probe:
      enabled: false
      url_template: "https://www.whitepages.com/name/{name_dashed}/{city_dashed}"
      found_markers: ["view full report", "lives in", "related to"]
      notfound_markers: ["no results", "we could not find"]
    verify_before_enable: true

