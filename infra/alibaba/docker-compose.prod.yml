# Ayin — Alibaba Cloud ECS deployment (Qwen hackathon, Workstream C).
#
# Self-contained production compose (NOT an override of the dev file — the
# dev file publishes Postgres/Redis/MinIO ports and bind-mounts live source;
# neither belongs on a public box). Only Caddy (80/443) is exposed; every
# other service lives on the internal network.
#
# Secrets come from ./.env, which deploy.sh GENERATES ON THE SERVER on first
# run — production secrets are never committed (CLAUDE.md). The architecture
# this demonstrates: Qwen Cloud (QWEN_BASE_URL) + Alibaba Cloud (this host).

name: ayin-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ayin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?generated by deploy.sh}
      POSTGRES_DB: ayin
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ayin -d ayin"]
      interval: 5s
      timeout: 3s
      retries: 10
    # no ports: — internal network only

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    image: python:3.12-slim
    restart: unless-stopped
    working_dir: /app
    # `pip install .` runs setuptools' egg_info *in the source tree* (pip builds
    # local dirs in place, not a temp copy), and the tree is mounted read-only —
    # so it dies with "could not create 'ayin_backend.egg-info': Read-only file
    # system". Build from a writable copy (/build) instead. PYTHONPATH=/app then
    # makes the app run from the (complete) bind-mounted source while deps live
    # in site-packages — so the :ro mount stays intact (no repo mutation).
    # seed_demo runs after migrations and is a no-op unless DEMO_MODE is set.
    command: >
      sh -c "rm -rf /build && cp -r /app /build && cd /build &&
             pip install --quiet . &&
             cd /app &&
             alembic upgrade head &&
             python scripts/seed_demo.py &&
             uvicorn ayin.api.main:app --host 0.0.0.0 --port 8000 --workers 2
             --proxy-headers --forwarded-allow-ips='*'"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://ayin:${POSTGRES_PASSWORD}@postgres:5432/ayin
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /app              # run from the bind-mounted source (see command)
      APP_ENV: production           # refuses to boot on dev secrets (config.py)
      COOKIE_SECURE: "true"
      SCAN_EXECUTION: celery
      BETA_INVITE_REQUIRED: "true"  # judges use the demo account / invite code
      DEMO_MODE: "true"             # enable synthetic source + seed demo account
    volumes:
      - ../../backend:/app:ro
      - api-pip-cache:/root/.cache/pip
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    image: python:3.12-slim
    restart: unless-stopped
    working_dir: /app
    # Build from a writable copy (see api — the source mount is :ro). celery_app
    # includes the task module, so the worker registers run_job/resume_stalled/
    # purge_expired.
    command: >
      sh -c "rm -rf /build && cp -r /app /build && cd /build &&
             pip install --quiet . &&
             cd /app &&
             celery -A ayin.orchestrator.celery_app:celery_app worker -B -l info --concurrency=1"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://ayin:${POSTGRES_PASSWORD}@postgres:5432/ayin
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /app              # run from the bind-mounted source (see api)
      APP_ENV: production
      SCAN_EXECUTION: celery
      DEMO_MODE: "true"             # worker enables the same synthetic source
    volumes:
      - ../../backend:/app:ro
      - api-pip-cache:/root/.cache/pip
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /app
    # --include=dev is REQUIRED: NODE_ENV=production (needed at runtime for
    # `next start`) makes `npm install` omit devDependencies — but `typescript`
    # lives there, and without it `next build` silently ignores tsconfig `paths`,
    # so every "@/..." import fails to resolve and the build dies. Force dev deps
    # for the build; they're harmless at runtime.
    command: sh -c "npm install --include=dev --no-audit --no-fund && npm run build && npm run start"
    environment:
      NEXT_PUBLIC_API_URL: ${PUBLIC_BASE_URL:?generated by deploy.sh}/api
      API_INTERNAL_URL: http://api:8000
      NODE_ENV: production
    volumes:
      - ../../frontend:/app
      - web-node-modules:/app/node_modules
    depends_on:
      - api

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      PUBLIC_HOST: ${PUBLIC_HOST:?set by deploy.sh (domain or ECS public IP)}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api
      - web

volumes:
  postgres-data:
  redis-data:
  api-pip-cache:
  web-node-modules:
  caddy-data:
  caddy-config:
